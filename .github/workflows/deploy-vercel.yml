name: Deploy to Vercel on Release

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual deployment

jobs:
  deploy-vercel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: |
          echo "Building core package..."
          pnpm --filter '@tatou/core' build
          echo "Building UI package..."  
          pnpm --filter '@tatou/ui' build

      - name: Build application for Vercel
        run: pnpm --filter "@tatou/oss" build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Deployment summary
        run: |
          echo "✅ SparkTest deployed to Vercel successfully!"
          echo "🌐 Production URL: https://sparktest-oss.vercel.app"
          echo "🏷️  Release version: ${{ github.event.release.tag_name }}"
